app.upload.public-base-url=http://13.233.212.72:8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.admin.api-key=revshop-admin-2026

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

razorpay.key-id=${razorpay-key-id}
razorpay.key-secret=${razorpay-key-secret}
razorpay.currency=INR
razorpay.success-url=${razorpay-success-url}
razorpay.cancel-url=${razorpay-cancel-url}
