spring.application.name=revshop

mytestkey=This value is from DEV properties file

spring.datasource.url=jdbc:mysql://payment-integration-dev-db.cliq0usmgng4.ap-south-1.rds.amazonaws.com:3306/validations?useSSL=false&serverTimezone=UTC
spring.datasource.username=validations_user
